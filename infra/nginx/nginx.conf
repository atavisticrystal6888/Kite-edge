# KiteEdge nginx reverse proxy
# Terminates TLS and forwards to Phoenix gateway.
# Usage: Replace $DOMAIN with your actual domain.
# SSL certs via certbot: certbot --nginx -d $DOMAIN

upstream phoenix {
    server gateway:4000;
}

upstream analytics {
    server analytics_engine:8001;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ${PHX_HOST};
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ${PHX_HOST};

    # TLS certificates (managed by certbot or mounted)
    ssl_certificate     /etc/letsencrypt/live/${PHX_HOST}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${PHX_HOST}/privkey.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (handled by Phoenix too, but defense in depth)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Request limits
    client_max_body_size 10m;

    # Rate limiting zone (10 req/sec per IP with burst)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Phoenix API (all routes)
    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://phoenix;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade (Phoenix Channels)
    location /socket {
        proxy_pass http://phoenix;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://phoenix;
        proxy_set_header Host $host;
    }

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
