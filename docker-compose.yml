# KiteEdge local development stack.
# Brings up all infrastructure plus the six KiteEdge services defined in plan.md.
# Production targets ECS + RDS + ElastiCache + MSK; the logical boundaries match.

name: kiteedge

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kiteedge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiteedge}
      POSTGRES_DB: ${POSTGRES_DB:-kiteedge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kiteedge}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "KiteEdgeLocalDev000001"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP: "kafka:9092"
    volumes:
      - ./infra/kafka:/scripts:ro
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana

  gateway:
    build:
      context: .
      dockerfile: infra/docker/gateway.Dockerfile
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }
    ports:
      - "4000:4000"

  market_data:
    build:
      context: .
      dockerfile: infra/docker/market_data.Dockerfile
    env_file: [.env]
    depends_on:
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  notification:
    build:
      context: .
      dockerfile: infra/docker/notification.Dockerfile
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      kafka:    { condition: service_healthy }

  analytics_engine:
    build:
      context: ./analytics_engine
      dockerfile: Dockerfile
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "8001:8001"

  data_pipeline:
    build:
      context: ./data_pipeline
      dockerfile: Dockerfile
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      kafka:    { condition: service_healthy }

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      VITE_GATEWAY_URL: "http://localhost:4000"
    ports:
      - "5173:5173"

  # Reverse proxy (production) — uncomment for TLS termination
  # nginx:
  #   image: nginx:1.27-alpine
  #   restart: unless-stopped
  #   depends_on:
  #     - gateway
  #     - analytics_engine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #     - /var/www/certbot:/var/www/certbot:ro

volumes:
  postgres_data:
  kafka_data:
  grafana_data:
